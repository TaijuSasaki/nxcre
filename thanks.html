<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせありがとうございます | Nexus Creative 88</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #111827;
      background: #fafafa;
      font-family: "Inter", "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      line-height: 1.7;
    }
    main {
      width: min(680px, 100%);
      padding: clamp(28px, 7vw, 56px);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(17, 24, 39, .12);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.15;
    }
    p { margin: 0 0 26px; color: #5b6472; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      color: #fff;
      background: #111827;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>お問い合わせありがとうございます。</h1>
    <p>内容を確認し、通常1から2営業日以内にご返信します。お急ぎの場合は、メールでもご連絡ください。</p>
    <a href="/">トップへ戻る</a>
  </main>
</body>
</html>
